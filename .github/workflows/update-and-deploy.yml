name: Update feeds & Deploy

on:
  schedule:
    - cron: "0 */6 * * *" # 6時間ごと
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # feed.json のコミット用
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 取得＋コミットは cron / 手動実行時のみ（push 時は既存キャッシュでビルドしてループ回避）
      # X: 自分のブックマークは basecamp 公開JSON（トークン不要）、外部アカウントのポストは
      # X API App-only Bearer（X_BEARER_TOKEN）。Feedly/はてブは公開RSSを直接取得（トークン不要）。
      - name: Aggregate feeds
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npm run aggregate
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          # LayerX AI・LLM Newsletter を Gmail から取得（任意。未設定ならそのソースをスキップ）
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

      - name: Commit feed.json if changed
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add src/data/feed.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update feed $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Build site
        run: npm run build
        env:
          GH_USER: ${{ github.repository_owner }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
